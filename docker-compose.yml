services:
  servicebus-producer:
    build:
      context: .
      dockerfile: Dockerfile
    image: servicebus-producer
    container_name: servicebus-producer
    env_file:
      - .env
    ports:
      - "8005:8005"
    networks:
      - servicebus-local

  mssql:
    container_name: "mssql"
    image: "mcr.microsoft.com/mssql/server:2022-latest"
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: Password1*
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - servicebus-local

  servicebus-emulator:
    container_name: "servicebus-emulator"
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    ports:
      - "5672:5672"
      - "5300:5300"
    environment:
      SQL_SERVER: mssql
      MSSQL_SA_PASSWORD: Password1*
      ACCEPT_EULA: Y
    volumes:
      - "./sb-emulator/config.json:/ServiceBus_Emulator/ConfigFiles/Config.json"
    depends_on:
      - mssql
    networks:
      - servicebus-local

volumes:
  mssql_data:

networks:
  servicebus-local:
    name: servicebus-local
